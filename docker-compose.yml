# LIP demo stack — one command: `make up` (or `docker compose up -d --build`)
#
# Startup order is enforced with healthchecks:
#   postgres/timescaledb/neo4j/kafka  ->  kafka-init (creates lip.* topics)
#     ->  api / normalizer / projector  ->  simulator (drives the world)
#   debezium (CDC) registers its connector via debezium-init
#
# Every service that produces events publishes through the canonical envelope;
# see EVENT-CATALOG.md and ARCHITECTURE.md.

services:
  # --- world model + projections --------------------------------------------

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lip_world
      POSTGRES_USER: lip_user
      POSTGRES_PASSWORD: lip_password
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./server/database/postgres/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lip_user -d lip_world"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [lip]

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lip_timeseries
      POSTGRES_USER: timescale_user
      POSTGRES_PASSWORD: timescale_password
    volumes:
      - timescale_data:/home/postgres/pgdata/data
      - ./server/database/timescale/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timescale_user -d lip_timeseries"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [lip]

  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/lip_graph_password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
    networks: [lip]

  # --- event backbone ---------------------------------------------------------

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Canonical topics are created by kafka-init; Debezium creates cdc.raw.*
      # via its topic.creation settings. Nothing appears by accident.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 24
    networks: [lip]

  kafka-init:
    build: ./server
    command: ["python", "-m", "tools.create_topics"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    networks: [lip]

  # --- CDC (integration plane) -------------------------------------------------

  debezium:
    image: debezium/connect:2.7.3.Final
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: lip-connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
    networks: [lip]

  debezium-init:
    image: curlimages/curl:8.11.1
    volumes:
      - ./infra/debezium:/connectors:ro
    depends_on:
      debezium:
        condition: service_healthy
    command: >
      sh -c "
        code=$$(curl -s -o /tmp/out -w '%{http_code}' -X POST http://debezium:8083/connectors -H 'Content-Type: application/json' -d @/connectors/connector.json);
        if [ $$code = '201' ] || [ $$code = '409' ]; then
          echo \"CDC connector registered (HTTP $$code)\"; exit 0;
        fi;
        echo \"connector registration failed (HTTP $$code):\"; cat /tmp/out; exit 1
      "
    restart: "no"
    networks: [lip]

  # --- application services -----------------------------------------------------

  api:
    build: ./server
    ports:
      - "8000:8000"
    environment: &app_env
      POSTGRES_URL: postgresql://lip_user:lip_password@postgres:5432/lip_world
      TIMESCALE_URL: postgresql://timescale_user:timescale_password@timescaledb:5432/lip_timeseries
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lip_graph_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LIP_TENANT_ID: cxt-demo
    volumes:
      - ./server/database/postgres/seed.sql:/seed/seed.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health/live > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
    networks: [lip]

  normalizer:
    build: ./server
    command: ["python", "-m", "workers.normalizer"]
    environment: *app_env
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [lip]

  projector:
    build: ./server
    command: ["python", "-m", "workers.projector"]
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [lip]

  simulator:
    build: ./server
    command: ["python", "-m", "workers.simulator"]
    environment:
      <<: *app_env
      LIP_API_URL: http://api:8000
      SIM_TICK_SECONDS: "2.0"
      SIM_SPEED_MPH: "35"
      SIM_SPEED_MULTIPLIER: "8"
      SIM_AUTO_START_ROUTES: "false"
      SIM_DWELL_SECONDS: "6"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [lip]

  # --- experience plane -----------------------------------------------------------

  ui:
    build:
      context: ./ui
      args:
        # Google Maps JS key for the dispatch map. Resolution order:
        # host env GOOGLE_MAPS_API_KEY -> ui/.env on the build machine (git-
        # ignored) -> none (UI runs, map shows a fallback panel).
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks: [lip]

  # --- operator tools ---------------------------------------------------------------

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: lip-demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks: [lip]

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: [tools]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cxt.example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./server/database/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [lip]

volumes:
  postgres_data:
  timescale_data:
  neo4j_data:
  kafka_data:

networks:
  lip:
    driver: bridge
